<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BLE Attendance Scanner</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #007bff, #6610f2);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #28a745;
      color: white;
      transition: 0.3s;
    }
    button:hover {
      background-color: #218838;
    }
    #log {
      margin-top: 25px;
      width: 80%;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      max-height: 350px;
      overflow-y: auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>📡 BLE Attendance Scanner</h1>
  <p>Press the button below to start scanning for nearby student devices.</p>
  <button id="startScan">Start Scan</button>
  <div id="log">Waiting to start...</div>

  <script>
    const log = document.getElementById("log");
    const startScan = document.getElementById("startScan");

    startScan.addEventListener("click", async () => {
      log.innerHTML = "🔍 Scanning for student BLE devices...";

      try {
        // Trigger scan on backend
        const response = await fetch("http://127.0.0.1:5001/api/scan");
        const result = await response.json();

        if (result.status === "success") {
          log.innerHTML = "✅ Scan complete! Attendance data saved for today.";
        } else {
          log.innerHTML = `❌ Scan failed: ${result.message}`;
        }
      } catch (err) {
        log.innerHTML = `❌ Error starting scan: ${err}`;
      }
    });
  </script>
</body>
</html>
