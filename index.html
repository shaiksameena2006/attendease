<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BLE Attendance Scanner</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #007bff, #6610f2);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #28a745;
      color: white;
      transition: 0.3s;
    }
    button:hover {
      background-color: #218838;
    }
    #log {
      margin-top: 25px;
      width: 80%;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      max-height: 350px;
      overflow-y: auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>📡 BLE Attendance Scanner</h1>
  <p>Press the button below to start scanning for nearby student devices.</p>
  <button id="startScan">Start Scan</button>
  <div id="log">Waiting to start...</div>

  <script>
    const log = document.getElementById("log");
    const startScan = document.getElementById("startScan");

    startScan.addEventListener("click", async () => {
      log.innerHTML = "🔍 Scanning for student BLE devices...";

      // Call backend to trigger BLE scan
      fetch("http://127.0.0.1:5001/api/scan")
        .then(() => {
          let interval = setInterval(async () => {
            const res = await fetch("http://127.0.0.1:5001/api/view_students");
            const data = await res.json();
            if (Object.keys(data).length > 0) {
              log.innerHTML = "<strong>✅ Devices Found:</strong><br><br>";
              for (const [name, address] of Object.entries(data)) {
                log.innerHTML += `${name} — ${address}<br>`;
              }
            } else {
              log.innerHTML += "<br>⏳ Still scanning...";
            }
          }, 3000);

          // Stop refreshing after 20s
          setTimeout(() => clearInterval(interval), 20000);
        })
        .catch(err => {
          log.innerHTML = `❌ Error starting scan: ${err}`;
        });
    });
  </script>
</body>
</html>
